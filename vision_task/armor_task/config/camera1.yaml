#####-----决策参数-----#####
max_match_distance_: 5
enemy_color: blue
competition_mode: 0 # 0-3v3  1-超级对抗赛
min_detect_count: 5
max_temp_lost_count: 15

#####-----弹道参数-----#####
# 变大往左边
yaw_offset: 3.7  #需要实际标定，单位为°
# 变大往上边
pitch_offset: 0   #需要实际标定，单位为°
comming_angle: 60.0 #来弹角度，单位为°
leaving_angle: 8.0 #去弹角度，单位为°
high_speed_delay_time: 0.1275 #高速时延时，单位为s
low_speed_delay_time: 0.1275 #低速时延时，单位为s
decision_speed_: 20.0 #低速/高速切换阈值，单位为m/s
bullet_speed: 22.0

